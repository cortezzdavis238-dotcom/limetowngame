<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limetown: Uncover the Truth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e27;
            color: #e0e0e0;
            line-height: 1.6;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
        }

        header {
            background: #1a1f3a;
            border-bottom: 3px solid #ff6b6b;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2em;
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
            margin-bottom: 5px;
        }

        .static-effect {
            font-size: 0.9em;
            color: #888;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .game-area {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .location-display {
            background: #1a1f3a;
            border: 2px solid #ff6b6b;
            border-radius: 8px;
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.2);
            overflow-y: auto;
        }

        .location-display h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .location-description {
            color: #b0b0b0;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .clues-found {
            background: #0a0e27;
            border-left: 3px solid #4ecdc4;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .clues-found strong {
            color: #4ecdc4;
        }

        .navigation-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            background: #2a2f4a;
            border: 2px solid #4ecdc4;
            color: #4ecdc4;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        button:hover {
            background: #4ecdc4;
            color: #0a0e27;
            box-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .right-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-box {
            background: #1a1f3a;
            border: 2px solid #ffd93d;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(255, 217, 61, 0.2);
        }

        .stats-box h3 {
            color: #ffd93d;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.9em;
        }

        .stat-label {
            color: #b0b0b0;
        }

        .stat-value {
            color: #ffd93d;
            font-weight: bold;
        }

        .characters-box {
            background: #1a1f3a;
            border: 2px solid #95e1d3;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(149, 225, 211, 0.2);
            max-height: 200px;
            overflow-y: auto;
        }

        .characters-box h3 {
            color: #95e1d3;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .character-item {
            background: #0a0e27;
            border-left: 3px solid #95e1d3;
            padding: 8px;
            margin: 5px 0;
            border-radius: 3px;
            font-size: 0.85em;
        }

        .character-item .name {
            color: #95e1d3;
            font-weight: bold;
        }

        .character-item .status {
            color: #888;
            font-size: 0.8em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            border: 3px solid #ff6b6b;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.4);
        }

        .modal-content h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .modal-content p {
            color: #b0b0b0;
            margin-bottom: 15px;
            line-height: 1.8;
        }

        .modal-content .quote {
            background: #0a0e27;
            border-left: 4px solid #4ecdc4;
            padding: 15px;
            margin: 15px 0;
            border-radius: 4px;
            font-style: italic;
            color: #4ecdc4;
        }

        .modal-content .speaker {
            color: #ffd93d;
            font-weight: bold;
            margin-top: 5px;
        }

        .question-container {
            margin-top: 20px;
        }

        .question-container p {
            margin-bottom: 15px;
            color: #e0e0e0;
            font-weight: bold;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .answer-option {
            background: #2a2f4a;
            border: 2px solid #4ecdc4;
            color: #4ecdc4;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }

        .answer-option:hover {
            background: #4ecdc4;
            color: #0a0e27;
        }

        .answer-option.correct {
            background: #4caf50;
            border-color: #4caf50;
            color: #fff;
        }

        .answer-option.incorrect {
            background: #f44336;
            border-color: #f44336;
            color: #fff;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .win-screen {
            text-align: center;
        }

        .win-screen h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #4caf50;
        }

        .win-screen p {
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .symbol {
            font-size: 3em;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #0a0e27;
            border: 2px solid #ffd93d;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd93d, #ff6b6b);
            width: 0%;
            transition: width 0.3s;
        }

        .timer {
            font-size: 1.2em;
            color: #ff6b6b;
            font-weight: bold;
        }

        .limetown-symbol {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid #ff6b6b;
            border-radius: 50%;
            position: relative;
        }

        .limetown-symbol::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
